server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- React Router için kritik satır ---
    # Uygulamada /masa, /odeme, /siparislerim gibi adresler var ama bunlar
    # gerçek dosya değil, React içinde yönetiliyor. Kullanıcı doğrudan
    # bu adrese girince (ya da QR ile /masa?no=3 açılınca) nginx o dosyayı
    # bulamaz ve normalde 404 verir. try_files, dosya yoksa index.html'e
    # düşürür; böylece React Router devreye girip doğru ekranı gösterir.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statik dosyaları (js, css, resim) tarayıcıda önbelleğe al — daha hızlı açılır
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
